name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build
        env:
          TG_BUILD_API_ID: ${{ secrets.TG_BUILD_API_ID }}
          TG_BUILD_API_HASH: ${{ secrets.TG_BUILD_API_HASH }}
          TG_BUILD_VERSION: ${{ github.ref_name }}
        run: TG_BUILD_VERSION="${TG_BUILD_VERSION#v}" bun run build
      - name: Smoke-check binary
        run: ./dist/tg-houston/bin/tg --version
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/tg-houston-darwin-arm64.tar.gz dist/SHA256SUMS \
            --title "tg-houston ${{ github.ref_name }}" \
            --generate-notes
